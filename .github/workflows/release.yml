name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          --title "${{ github.ref_name }}"
          --generate-notes
          dist/*
          || gh release upload "${{ github.ref_name }}" dist/* --clobber

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/mdlcalc.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/mdlcalc.rb
          sed -i "s|homepage \".*\"|homepage \"https://github.com/${REPO}\"|" Formula/mdlcalc.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mdlcalc.rb
          git diff --cached --quiet || git commit -m "Update Homebrew formula for ${TAG}"
          git push origin HEAD:refs/heads/main
