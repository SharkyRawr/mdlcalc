name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Resolve built artifact names
        id: artifacts
        run: |
          SDIST="$(basename dist/*.tar.gz)"
          WHEEL="$(basename dist/*.whl)"
          echo "sdist=$SDIST" >> "$GITHUB_OUTPUT"
          echo "wheel=$WHEEL" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$REPO" --title "$TAG"
          else
            gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes
          fi

          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name' \
            | grep '^mdlcalc-' \
            | while IFS= read -r asset; do
                case "$asset" in
                  "${{ steps.artifacts.outputs.sdist }}"|"${{ steps.artifacts.outputs.wheel }}") ;;
                  *) gh release delete-asset "$TAG" "$asset" --repo "$REPO" -y ;;
                esac
              done

          gh release upload "$TAG" dist/* --repo "$REPO" --clobber
