name: Bottles

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15, macos-26]
    runs-on: ${{ matrix.runner }}
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      REPO: ${{ github.repository }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        run: |
          git fetch --force --tags origin
          TAG="$(git tag --points-at "$RELEASE_SHA" | grep '^v' | head -n 1)"
          test -n "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Point formula at release source tarball
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          SDIST="mdlcalc-${VERSION}.tar.gz"
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name' | grep -Fx "$SDIST"
          test -n "$SDIST"
          SDIST_URL="https://github.com/${REPO}/releases/download/${TAG}/${SDIST}"
          curl -fsSL "$SDIST_URL" -o "$RUNNER_TEMP/$SDIST"
          SDIST_SHA="$(shasum -a 256 "$RUNNER_TEMP/$SDIST" | awk '{print $1}')"
          python scripts/update_formula.py \
            --formula Formula/mdlcalc.rb \
            --repo "$REPO" \
            --sdist-url "$SDIST_URL" \
            --sdist-sha256 "$SDIST_SHA"

      - name: Build bottle
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          USER_NAME="$(printf '%s' "${REPO%%/*}" | tr '[:upper:]' '[:lower:]')"
          TAP_NAME="$(printf '%s' "${REPO##*/}" | tr '[:upper:]' '[:lower:]')"
          TAP_DIR="$(brew --repository)/Library/Taps/${USER_NAME}/homebrew-${TAP_NAME}"
          mkdir -p "$(dirname "$TAP_DIR")"
          rm -rf "$TAP_DIR"
          cp -R "$PWD" "$TAP_DIR"
          brew install --build-bottle "${USER_NAME}/${TAP_NAME}/mdlcalc"
          brew bottle --json --root-url="https://github.com/${REPO}/releases/download/${TAG}" mdlcalc
          mkdir -p bottle-artifacts
          mv ./*.bottle.* bottle-artifacts/
          python - <<'PY'
          import json
          from pathlib import Path

          for json_path in Path("bottle-artifacts").glob("*.json"):
              data = json.loads(json_path.read_text())
              bottle = next(iter(data.values()))
              for payload in bottle["bottle"]["tags"].values():
                  local_name = payload.get("local_filename")
                  filename = payload.get("filename")
                  if local_name and filename and local_name != filename:
                      source = Path("bottle-artifacts") / local_name
                      target = Path("bottle-artifacts") / filename
                      if source.exists():
                          source.rename(target)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.runner }}
          path: bottle-artifacts/*

  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: build
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: bottle-artifacts

      - name: Resolve release tag
        run: |
          git fetch --force --tags origin
          TAG="$(git tag --points-at "$RELEASE_SHA" | grep '^v' | head -n 1)"
          test -n "$TAG"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Upload bottles to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name' \
            | grep '^mdlcalc-.*\.bottle\.' \
            | while IFS= read -r asset; do
                gh release delete-asset "$TAG" "$asset" --repo "$REPO" -y
              done

          find bottle-artifacts -type f -name '*.tar.gz' -print0 | while IFS= read -r -d '' file; do
            gh release upload "$TAG" "$file" --repo "$REPO" --clobber
          done

      - name: Update formula for release and bottles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${TAG#v}"
          SDIST="mdlcalc-${VERSION}.tar.gz"
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name' | grep -Fx "$SDIST"
          test -n "$SDIST"
          SDIST_URL="https://github.com/${REPO}/releases/download/${TAG}/${SDIST}"
          curl -fsSL "$SDIST_URL" -o "$RUNNER_TEMP/$SDIST"
          SDIST_SHA="$(shasum -a 256 "$RUNNER_TEMP/$SDIST" | awk '{print $1}')"
          python scripts/update_formula.py \
            --formula Formula/mdlcalc.rb \
            --repo "$REPO" \
            --sdist-url "$SDIST_URL" \
            --sdist-sha256 "$SDIST_SHA" \
            --tag "$TAG" \
            --bottle-json-dir bottle-artifacts

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mdlcalc.rb
          git diff --cached --quiet || git commit -m "Update Homebrew bottle for ${TAG}"
          git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}"
