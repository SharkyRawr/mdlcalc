name: Bottles

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      REPO: ${{ github.repository }}
      TAG: ${{ github.event.release.tag_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}

      - name: Point formula at release source tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SDIST="$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".tar.gz") and (.name | contains(".bottle." ) | not)) | .name' | head -n 1)"
          test -n "$SDIST"
          SDIST_URL="https://github.com/${REPO}/releases/download/${TAG}/${SDIST}"
          curl -fsSL "$SDIST_URL" -o "$RUNNER_TEMP/$SDIST"
          SDIST_SHA="$(shasum -a 256 "$RUNNER_TEMP/$SDIST" | awk '{print $1}')"
          SDIST_URL="$SDIST_URL" SDIST_SHA="$SDIST_SHA" python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("Formula/mdlcalc.rb")
          text = path.read_text()
          text = re.sub(r'  homepage ".*"\n', f'  homepage "https://github.com/{os.environ["REPO"]}"\n', text, count=1)
          text = re.sub(r'  url ".*"\n', f'  url "{os.environ["SDIST_URL"]}"\n', text, count=1)
          text = re.sub(r'  sha256 ".*"\n', f'  sha256 "{os.environ["SDIST_SHA"]}"\n', text, count=1)
          text = re.sub(r'\n  bottle do\n(?:    .*\n)+?  end\n', '\n', text, count=1)
          path.write_text(text)
          PY

      - name: Build bottle
        run: |
          brew install --build-bottle ./Formula/mdlcalc.rb
          brew bottle --json --root-url="https://github.com/${REPO}/releases/download/${TAG}" mdlcalc
          mkdir -p bottle-artifacts
          mv ./*.bottle.* bottle-artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: bottles-macos-15
          path: bottle-artifacts/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      TAG: ${{ github.event.release.tag_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}

      - uses: actions/download-artifact@v4
        with:
          path: bottle-artifacts

      - name: Upload bottles to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find bottle-artifacts -type f -name '*.tar.gz' -print0 | while IFS= read -r -d '' file; do
            gh release upload "$TAG" "$file" --repo "$REPO" --clobber
          done

      - name: Update formula for release and bottles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SDIST="$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".tar.gz") and (.name | contains(".bottle.") | not)) | .name' | head -n 1)"
          test -n "$SDIST"
          SDIST_URL="https://github.com/${REPO}/releases/download/${TAG}/${SDIST}"
          curl -fsSL "$SDIST_URL" -o "$RUNNER_TEMP/$SDIST"
          SDIST_SHA="$(shasum -a 256 "$RUNNER_TEMP/$SDIST" | awk '{print $1}')"
          SDIST_URL="$SDIST_URL" SDIST_SHA="$SDIST_SHA" python - <<'PY'
          from pathlib import Path
          import json
          import os
          import re

          formula_path = Path("Formula/mdlcalc.rb")
          text = formula_path.read_text()
          text = re.sub(r'  homepage ".*"\n', f'  homepage "https://github.com/{os.environ["REPO"]}"\n', text, count=1)
          text = re.sub(r'  url ".*"\n', f'  url "{os.environ["SDIST_URL"]}"\n', text, count=1)
          text = re.sub(r'  sha256 ".*"\n', f'  sha256 "{os.environ["SDIST_SHA"]}"\n', text, count=1)
          text = re.sub(r'\n  bottle do\n(?:    .*\n)+?  end\n', '\n', text, count=1)

          entries = []
          for json_path in sorted(Path("bottle-artifacts").rglob("*.json")):
            data = json.loads(json_path.read_text())
            bottle = next(iter(data.values()))
            files = bottle["bottle"]["tags"]
            for tag_name, payload in sorted(files.items()):
              cellar = payload["cellar"]
              cellar_value = ":any_skip_relocation" if cellar == "any_skip_relocation" else f'"{cellar}"'
              entries.append(f'    sha256 cellar: {cellar_value}, {tag_name}: "{payload["sha256"]}"')

          if not entries:
            raise SystemExit("No bottle JSON files found")

          bottle_block = "  bottle do\n"
          bottle_block += f'    root_url "https://github.com/{os.environ["REPO"]}/releases/download/{os.environ["TAG"]}"\n'
          bottle_block += "\n".join(entries)
          bottle_block += "\n  end\n"

          text = text.replace('  depends_on "python@3.12"\n', f'  depends_on "python@3.12"\n\n{bottle_block}\n', 1)
          formula_path.write_text(text)
          PY

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mdlcalc.rb
          git diff --cached --quiet || git commit -m "Update Homebrew bottle for ${TAG}"
          git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}"
